<!DOCTYPE html>
<html>

<head>
  <title>Kirjat - Luo arvio</title>
</head>

<body>
  <form action="/result" method="post">
    <p>Kirja: <br />
      <textarea name1="kirja" rows="1" cols="50"></textarea>
    </p>
    <p>Kirjailija: <br />
      <textarea name2="kirjailija" rows="1" cols="50"></textarea>
    </p>
    <p>Valitse :</p>
    <p>
      <input type="radio" name="tahti" value="1" /> 1 tähteä
      <input type="radio" name="tahti" value="2" /> 2 tähteä
      <input type="radio" name="tahti" value="3" /> 3 tähteä
      <input type="radio" name="tahti" value="4" /> 4 tähteä
      <input type="radio" name="tahti" value="5" /> 5 tähteä
    </p>
    <p>Valitse genret:</p>
    <p>
      <input type="checkbox" name="genre" value="fantasia" /> fantasia
      <input type="checkbox" name="genre" value="B" /> fiktio
      <input type="checkbox" name="genre" value="C" /> jännäri
      <input type="checkbox" name="genre" value="D" /> kauhu
      <input type="checkbox" name="genre" value="E" /> romatiikka
      <input type="checkbox" name="genre" value="F" /> tietokirja
    </p>
    <p>Omin sanoin: <br />
      <textarea name="message" rows="3" cols="50"></textarea>
    </p>
    <input type="submit" value="Lähetä arvio" />
  </form>
</body>

</html>
